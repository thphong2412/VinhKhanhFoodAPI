<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Mapbox Offline Quận 4</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
    <style>
        body, html { margin:0; padding:0; height:100%; }
        #map { position:absolute; top:0; bottom:0; width:100%; }
    </style>
</head>
<body>
<div id="map"></div>
<script>
    mapboxgl.accessToken = 'pk.eyJ1IjoicGhvbmcyNDA1IiwiYSI6ImNtbnc0N2R6NTB2d3gzeW9uOHpzNHJwc3AifQ.Empr3_28RL7glp9cvD-8Fg';
    var map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/streets-v12',
        center: [106.7009, 10.7626], // Quận 4
        zoom: 14,
        maxBounds: [
            [106.690, 10.755], // Southwest (minLng, minLat)
            [106.715, 10.770]  // Northeast (maxLng, maxLat)
        ]
    });
    // Nếu có tile offline, cấu hình thêm source ở đây
</script>
</body>
</html>
